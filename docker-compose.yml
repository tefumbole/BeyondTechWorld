# Local MySQL for offline development (no internet required after first pull)
services:
  mysql:
    image: mysql:8.0
    container_name: alphabridge-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: alphabridge_local
      MYSQL_DATABASE: alphabridge
      MYSQL_USER: abt
      MYSQL_PASSWORD: alphabridge_local
    volumes:
      - alphabridge_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  alphabridge_mysql_data:
